<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VIBE.TESTING — כניסה</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#04080f;--surface:#080e1a;--surface2:#0c1220;
  --border:#162035;--border2:#1e2d45;
  --text:#f0f6ff;--muted:#7a9abf;--dim:#4a6480;
  --green:#00e5a0;--green2:#00ffc8;--purple2:#8b5cf6;
  --amber:#f59e0b;--red:#f43f5e;--blue:#3b82f6;
  --radius:12px;
}

html{
  height:100%;
  overflow-y:auto;   /* ensure page-level scroll is never suppressed */
}
body{
  min-height:100%;
  overflow-y:auto;   /* explicit scroll on body — required for iOS Safari edge cases */
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono','Courier New',monospace;
  font-size:16px;
  -webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased;
}

/* ── BACKGROUND GRID (matches index.html) ─── */
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,229,160,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,160,.03) 1px,transparent 1px);
  background-size:40px 40px;
}
.bg-glow{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,229,160,.06),transparent);
}

/* ── LAYOUT ─────────────────────────────────── */
.auth-wrap{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;
  align-items:flex-start;   /* short screens: top-align so card is always scrollable */
  justify-content:center;
  padding:40px 16px 32px;
}
/* tall screens: vertically center the card */
@media(min-height:700px){
  .auth-wrap{ align-items:center; }
}

.auth-card{
  width:100%;
  max-width:420px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:36px 32px 32px;
  position:relative;
  overflow:hidden;
}

/* top gradient bar — same style as index.html modals */
.auth-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--green),var(--blue),var(--purple2));
}

/* ── LOGO ───────────────────────────────────── */
.auth-logo{
  text-align:center;
  margin-bottom:32px;
}
.auth-logo-eyebrow{
  font-size:10px;font-weight:700;
  letter-spacing:.25em;color:var(--green);
  text-transform:uppercase;margin-bottom:4px;
}
.auth-logo-name{
  font-size:24px;font-weight:800;
  letter-spacing:.06em;color:var(--text);
}
.auth-logo-dot{color:var(--green);}

/* ── HEADINGS ───────────────────────────────── */
.auth-title{
  font-size:18px;font-weight:700;
  margin-bottom:4px;color:var(--text);
}
.auth-sub{
  font-size:13px;color:var(--muted);
  margin-bottom:24px;line-height:1.5;
}

/* ── FIELDS ─────────────────────────────────── */
.field{margin-bottom:14px;}

.field label{
  display:block;
  font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}

.field input{
  width:100%;
  min-height:48px;           /* touch target */
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:12px 14px;
  color:var(--text);
  font-size:16px;            /* prevents iOS auto-zoom */
  font-family:inherit;
  outline:none;
  transition:border-color .15s;
  -webkit-appearance:none;
  appearance:none;
}
.field input:focus{border-color:var(--green);}
.field input::placeholder{color:var(--dim);}

/* ── BUTTONS ─────────────────────────────────── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;min-height:48px;
  border-radius:var(--radius);
  font-size:14px;font-weight:700;font-family:inherit;
  letter-spacing:.05em;text-transform:uppercase;
  cursor:pointer;border:none;
  transition:opacity .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  outline:none;
  position:relative;
}
.btn:active:not(:disabled){transform:scale(.97);opacity:.85;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.btn-primary{
  background:linear-gradient(135deg,var(--green),#00c48a);
  color:#04080f;margin-bottom:12px;
}
.btn-google{
  background:var(--surface2);color:var(--text);
  border:1px solid var(--border2);margin-bottom:20px;
}
.btn-secondary{
  background:transparent;color:var(--muted);
  border:1px solid var(--border2);
  font-size:13px;letter-spacing:.03em;
}

/* spinner */
.btn .spin{
  width:16px;height:16px;flex-shrink:0;
  border:2px solid rgba(4,8,15,.25);
  border-top-color:#04080f;
  border-radius:50%;
  animation:spin .55s linear infinite;
  display:none;
}
.btn-google .spin,.btn-secondary .spin{
  border-color:rgba(240,246,255,.15);
  border-top-color:var(--text);
}
.btn.loading .spin{display:inline-block;}
.btn.loading .btn-lbl{visibility:hidden;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── DIVIDER ─────────────────────────────────── */
.divider{
  display:flex;align-items:center;gap:10px;
  margin:4px 0 14px;
  color:var(--dim);font-size:11px;letter-spacing:.1em;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:var(--border2);
}

/* ── MESSAGES ────────────────────────────────── */
.msg{
  padding:11px 14px;border-radius:10px;
  font-size:13px;line-height:1.5;
  margin-bottom:16px;display:none;
}
.msg.show{display:block;}
.msg.error{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);color:#fca5a5;}
.msg.success{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.25);color:var(--green);}
.msg.info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);color:#93c5fd;}

/* ── LINK BUTTONS ────────────────────────────── */
.auth-links{text-align:center;margin-top:12px;}
.auth-links p{font-size:13px;color:var(--muted);margin-top:6px;}
.lnk{
  background:none;border:none;
  color:var(--green);font-size:inherit;
  font-family:inherit;font-weight:600;
  cursor:pointer;padding:4px 2px;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;
}
.lnk:active{opacity:.7;}

/* ── VERIFY VIEW ─────────────────────────────── */
.verify-icon{font-size:44px;text-align:center;margin-bottom:14px;}
.resend-note{font-size:12px;color:var(--dim);text-align:center;margin-top:8px;min-height:18px;}

/* ── VIEWS ───────────────────────────────────── */
.view{display:none;}
.view.active{display:block;}

/* ── GOOGLE LOGO (inline SVG) ────────────────── */
.g-logo{flex-shrink:0;}

/* ── INIT LOADING STATE ──────────────────────── */
/* Shown while session check is in-flight — prevents login flash for authed users */
#auth-loading{
  display:none;
  text-align:center;
  padding:32px 0 20px;
}
.init-spin{
  width:24px;height:24px;
  border:2px solid var(--border2);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin .6s linear infinite;
  margin:0 auto 12px;
}
#auth-loading-lbl{font-size:12px;color:var(--dim);letter-spacing:.08em;}
.auth-card.init-loading #auth-loading{display:block;}
.auth-card.init-loading .view{display:none!important;}

/* ── MOBILE ──────────────────────────────────── */
@media(max-width:480px){
  .auth-card{padding:28px 20px 24px;border-radius:16px;}
  .auth-logo-name{font-size:20px;}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="auth-wrap">
<div class="auth-card init-loading" id="auth-card">

  <!-- shown while session check runs; hidden once a view is shown -->
  <div id="auth-loading">
    <div class="init-spin"></div>
    <div id="auth-loading-lbl">טוען...</div>
  </div>

  <div class="auth-logo">
    <div class="auth-logo-eyebrow">◆ AI QA Platform</div>
    <div class="auth-logo-name">VIBE<span class="auth-logo-dot">.</span>TESTING</div>
  </div>

  <!-- ── LOGIN ───────────────────────────────── -->
  <div id="v-login" class="view active">
    <div class="auth-title">ברוך הבא</div>
    <div class="auth-sub">התחבר לחשבון שלך להמשך</div>
    <div id="login-msg" class="msg"></div>

    <div class="field">
      <label>אימייל</label>
      <input id="login-email" type="email" placeholder="you@example.com"
             autocomplete="email" inputmode="email"/>
    </div>
    <div class="field">
      <label>סיסמה</label>
      <input id="login-pass" type="password" placeholder="••••••••"
             autocomplete="current-password"/>
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
      <span class="spin"></span><span class="btn-lbl">כניסה</span>
    </button>

    <div class="divider">או</div>

    <button class="btn btn-google" id="google-login-btn" onclick="doGoogle()">
      <span class="spin"></span>
      <span class="btn-lbl" style="display:flex;align-items:center;gap:8px;direction:ltr">
        <svg class="g-logo" width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.706 17.64 9.2z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        כניסה עם Google
      </span>
    </button>

    <div class="auth-links">
      <p><button class="lnk" onclick="goForgot()">שכחת סיסמה?</button></p>
      <p>אין לך חשבון? <button class="lnk" onclick="showView('v-signup')">הרשמה</button></p>
    </div>
  </div>

  <!-- ── SIGNUP ──────────────────────────────── -->
  <div id="v-signup" class="view">
    <div class="auth-title">יצירת חשבון</div>
    <div class="auth-sub">הצטרף ל-VIBE.TESTING</div>
    <div id="signup-msg" class="msg"></div>

    <div class="field">
      <label>אימייל</label>
      <input id="signup-email" type="email" placeholder="you@example.com"
             autocomplete="email" inputmode="email"/>
    </div>
    <div class="field">
      <label>סיסמה</label>
      <input id="signup-pass" type="password" placeholder="לפחות 8 תווים"
             autocomplete="new-password"/>
    </div>
    <div class="field">
      <label>אימות סיסמה</label>
      <input id="signup-pass2" type="password" placeholder="חזור על הסיסמה"
             autocomplete="new-password"/>
    </div>

    <button class="btn btn-primary" id="signup-btn" onclick="doSignup()">
      <span class="spin"></span><span class="btn-lbl">יצירת חשבון</span>
    </button>

    <div class="divider">או</div>

    <button class="btn btn-google" id="google-signup-btn" onclick="doGoogle()">
      <span class="spin"></span>
      <span class="btn-lbl" style="display:flex;align-items:center;gap:8px;direction:ltr">
        <svg class="g-logo" width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.706 17.64 9.2z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        הרשמה עם Google
      </span>
    </button>

    <div class="auth-links">
      <p>יש לך חשבון? <button class="lnk" onclick="showView('v-login')">כניסה</button></p>
    </div>
  </div>

  <!-- ── VERIFY EMAIL ─────────────────────────── -->
  <div id="v-verify" class="view">
    <div class="verify-icon">📧</div>
    <div class="auth-title" style="text-align:center">בדוק את תיבת הדואר</div>
    <div class="auth-sub" style="text-align:center">
      שלחנו קישור אימות אל<br>
      <strong id="verify-email-display" style="color:var(--text);word-break:break-all"></strong>
    </div>
    <div id="verify-msg" class="msg"></div>

    <button class="btn btn-secondary" id="resend-btn" onclick="doResend()">
      <span class="spin"></span><span class="btn-lbl">שלח שוב</span>
    </button>
    <div class="resend-note" id="resend-timer"></div>

    <div class="auth-links" style="margin-top:16px">
      <p><button class="lnk" onclick="showView('v-login')">חזרה לכניסה</button></p>
    </div>
  </div>

  <!-- ── FORGOT PASSWORD ──────────────────────── -->
  <div id="v-forgot" class="view">
    <div class="auth-title">שחזור סיסמה</div>
    <div class="auth-sub">נשלח לך קישור לאיפוס הסיסמה</div>
    <div id="forgot-msg" class="msg"></div>

    <div class="field">
      <label>אימייל</label>
      <input id="forgot-email" type="email" placeholder="you@example.com"
             autocomplete="email" inputmode="email"/>
    </div>

    <button class="btn btn-primary" id="forgot-btn" onclick="doForgot()">
      <span class="spin"></span><span class="btn-lbl">שלח קישור איפוס</span>
    </button>

    <div class="auth-links">
      <p><button class="lnk" onclick="showView('v-login')">חזרה לכניסה</button></p>

  <!-- ── RESET PASSWORD ───────────────────────── -->
  <div id="v-reset" class="view">
    <div class="auth-title">סיסמה חדשה</div>
    <div class="auth-sub">בחר סיסמה חדשה לחשבונך</div>
    <div id="reset-msg" class="msg"></div>

    <div class="field">
      <label>סיסמה חדשה</label>
      <input id="reset-pass" type="password" placeholder="לפחות 8 תווים"

    </div>
    <div class="field">
      <label>אימות סיסמה</label>
      <input id="reset-pass2" type="password" placeholder="חזור על הסיסמה"

    </div>

    <button class="btn btn-primary" id="reset-btn" onclick="doReset()">
      <span class="spin"></span><span class="btn-lbl">עדכון סיסמה</span>
    </button>
  </div>

</div><!-- /.auth-card -->
</div><!-- /.auth-wrap -->

<script>
// ── CONFIG ───────────────────────────────────────────────────
// SUPABASE_URL and SUPABASE_ANON_KEY are public values — safe to commit.
var SUPABASE_URL      = 'https://wiqghanzcwmzyqzfzkiv.supabase.co'
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpcWdoYW56Y3dtenlxemZ6a2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODIwNjcsImV4cCI6MjA5MDI1ODA2N30.uXDx_80yBh8DmcLvH77tW1o8GqgTC7eXJIZUtsvpqTw'
var APP_URL           = 'https://haimzadokk.github.io/vibe-testing'  // no trailing slash

// ── CLIENT ──────────────────────────────────────────────────
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    storage:            localStorage,
    autoRefreshToken:   true,
    persistSession:     true,
    detectSessionInUrl: true,
    flowType:           'pkce'      // no tokens in URLs; code exchange only
  }
})

// ── STATE ────────────────────────────────────────────────────
var pendingEmail  = ''
var resendTimer   = null
var _deferredMsg  = null   // [id, type, text] — replayed by showView after loading state clears

// ── INIT: handle URL params + session ───────────────────────
;(async function init() {
  var params = new URLSearchParams(window.location.search)
  // NOTE: do NOT clean URL here — Supabase SDK may still be exchanging token_hash.
  // URL is cleaned inside onAuthStateChange after the SDK confirms the exchange.

  // Supabase can return tokens in EITHER query params (PKCE: ?code=) OR hash (implicit: #access_token=)
  var hash         = new URLSearchParams(window.location.hash.replace(/^#/, ''))
  var type         = params.get('type') || hash.get('type')   // 'recovery' | 'signup' | null
  var msg          = params.get('msg')    // our app params: 'logged_out' | 'session_expired' | 'password_reset' | 'verify'
  var hasEmailCode = !!params.get('code') || !!params.get('token_hash') ||
                     !!hash.get('access_token') || !!hash.get('token_hash')  // defer for both PKCE and implicit
  var isRecovery   = type === 'recovery'  // password-reset flow — must wait for PASSWORD_RECOVERY before routing

  // ── Register onAuthStateChange FIRST — before any early returns ──
  // Single source of truth for all auth state: OAuth, email confirm, recovery, existing sessions.
  sb.auth.onAuthStateChange(function(event, session) {
    // URL is safe to clean now — SDK has finished processing token_hash
    cleanUrl()

    if (event === 'PASSWORD_RECOVERY') {
      showView('v-reset')
      return
    }
    if (event === 'INITIAL_SESSION') {
      // If a PKCE code is in the URL, wait for the exchange to complete
      // before routing — INITIAL_SESSION fires before the code is exchanged.
      if (hasEmailCode) return
      if (session && session.user.email_confirmed_at) { redirect(); return; }
      if (session && !session.user.email_confirmed_at) { showVerify(session.user.email); return; }
      // null session on initial load — show login (removes loading state)
      showView('v-login')
      return
    }
    if (event === 'SIGNED_IN' && session) {
      if (isRecovery) return  // password-reset: wait for PASSWORD_RECOVERY event before routing
      if (session.user.email_confirmed_at) { redirect(); }
      else { showVerify(session.user.email); }
      return
    }
  })

  // ── OAuth/Supabase errors returned via redirect URL ─────────────────
  var urlError = params.get('error')
  if (urlError) {
    _deferredMsg = ['login-msg', 'error', 'שגיאה בכניסה עם Google — נסה שוב']
    cleanUrl()
    showView('v-login')
    return
  }

  // ── Status messages — stored as deferred, replayed when showView fires ──
  // (showView clears messages before re-applying, so we can't set them before the view is shown)
  if (msg === 'logged_out')      _deferredMsg = ['login-msg', 'info',    'יצאת מהמערכת בהצלחה']
  if (msg === 'session_expired') _deferredMsg = ['login-msg', 'error',   'הפעלה פגה — יש להתחבר מחדש']
  if (msg === 'password_reset')  _deferredMsg = ['login-msg', 'success', 'הסיסמה עודכנה — התחבר עם הסיסמה החדשה']

  // ── Verify redirect from index.html auth guard ──────────────────
  // Guard redirects to: auth.html?msg=verify&email=...
  if (msg === 'verify') {
    var em = params.get('email') || ''
    if (em) {
      pendingEmail = em
      document.getElementById('verify-email-display').textContent = em
    }
    cleanUrl()          // safe to clean now — no Supabase token params in this redirect
    showView('v-verify')
    return
  }

  // Default: INITIAL_SESSION event above will fire shortly and either
  // redirect (authed user) or call showView('v-login') (no session).
})();

// ── URL CLEANUP ───────────────────────────────────────────────
// Called only after onAuthStateChange confirms SDK has finished processing.
// Also clears hash fragments left by any implicit-flow remnants.
function cleanUrl() {
  if (window.location.search || window.location.hash) {
    window.history.replaceState({}, '', window.location.pathname)
  }
}

// ── REDIRECT ──────────────────────────────────────────────────
// Uses a relative path so this works at any subpath deployment
// (root, /vibe-testing/, or any other base).
// auth.html and index.html always live in the same directory.
function redirect() {
  window.location.replace('index.html')
}

// ── VIEW HELPERS ─────────────────────────────────────────────
function showView(id) {
  // Capture and clear deferred message before showMsg is called below
  var dm = _deferredMsg; _deferredMsg = null
  // Remove loading state
  document.getElementById('auth-card').classList.remove('init-loading')
  // Switch views
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active') })
  document.getElementById(id).classList.add('active')
  // Clear all existing messages
  document.querySelectorAll('.msg').forEach(function(m) { m.className = 'msg'; m.textContent = '' })
  // Replay any deferred message (e.g. 'logged_out' set before loading state cleared)
  if (dm) showMsg(dm[0], dm[1], dm[2])
}

function showVerify(email) {
  pendingEmail = email || ''
  document.getElementById('verify-email-display').textContent = pendingEmail
  showView('v-verify')
  // If the user already confirmed in another tab, redirect immediately.
  sb.auth.getSession().then(function(result) {
    var s = result.data && result.data.session
    if (s && s.user && s.user.email_confirmed_at) { redirect() }
  })
}

function goForgot() {
  // Pre-fill from login form if the user already typed their email
  var em = document.getElementById('login-email').value.trim()
  if (em) document.getElementById('forgot-email').value = em
  showView('v-forgot')
}

function showMsg(id, type, text) {
  var el = document.getElementById(id)
  el.textContent = text
  el.className = 'msg show ' + type
}

// ── BUTTON LOADING ───────────────────────────────────────────
function setLoading(btnId, on) {
  var btn = document.getElementById(btnId)
  btn.disabled = on
  btn.classList.toggle('loading', on)
}

// ── VALIDATION ───────────────────────────────────────────────
function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e) }

// ── LOGIN ────────────────────────────────────────────────────
async function doLogin() {
  if (document.getElementById('login-btn').disabled) return  // already in-flight
  var email = document.getElementById('login-email').value.trim()
  var pass  = document.getElementById('login-pass').value
  if (!validEmail(email)) return showMsg('login-msg', 'error', 'כתובת אימייל לא תקינה')
  if (!pass)              return showMsg('login-msg', 'error', 'יש להזין סיסמה')

  setLoading('login-btn', true)
  var { error } = await sb.auth.signInWithPassword({ email: email, password: pass })
  setLoading('login-btn', false)

  if (!error) return  // onAuthStateChange handles redirect

  var m = error.message || ''
  if (m.includes('Email not confirmed') || m.includes('email_not_confirmed')) {
    showVerify(email); return
  }
  if (m.includes('Invalid login credentials') || m.includes('invalid_credentials')) {
    showMsg('login-msg', 'error', 'אימייל או סיסמה שגויים'); return
  }
  if (m.includes('Too many requests')) {
    showMsg('login-msg', 'error', 'יותר מדי ניסיונות — נסה שוב בעוד מספר דקות'); return
  }
  showMsg('login-msg', 'error', 'שגיאה בכניסה — נסה שוב')
}

// ── SIGNUP ───────────────────────────────────────────────────
async function doSignup() {
  if (document.getElementById('signup-btn').disabled) return  // already in-flight
  var email = document.getElementById('signup-email').value.trim()
  var pass  = document.getElementById('signup-pass').value
  var pass2 = document.getElementById('signup-pass2').value

  if (!validEmail(email))   return showMsg('signup-msg', 'error', 'כתובת אימייל לא תקינה')
  if (pass.length < 8)      return showMsg('signup-msg', 'error', 'הסיסמה חייבת להכיל לפחות 8 תווים')
  if (pass !== pass2)       return showMsg('signup-msg', 'error', 'הסיסמאות אינן תואמות')

  setLoading('signup-btn', true)
  var { error } = await sb.auth.signUp({
    email: email,
    password: pass,
    options: { emailRedirectTo: APP_URL + '/auth.html' }
  })
  setLoading('signup-btn', false)

  if (!error) { showVerify(email); return; }

  var m = error.message || ''
  if (m.includes('already registered') || m.includes('User already') || m.includes('already been registered')) {
    showMsg('signup-msg', 'error', 'כתובת אימייל זו כבר רשומה — התחבר או אפס סיסמה')
    return
  }
  showMsg('signup-msg', 'error', 'שגיאה בהרשמה — נסה שוב')
}

// ── GOOGLE OAUTH ─────────────────────────────────────────────
async function doGoogle() {
  var activeView = document.querySelector('.view.active')
  var isSignup   = activeView && activeView.id === 'v-signup'
  var msgId      = isSignup ? 'signup-msg'      : 'login-msg'
  var btnId      = isSignup ? 'google-signup-btn' : 'google-login-btn'

  if (document.getElementById(btnId).disabled) return  // already in-flight

  setLoading(btnId, true)
  var { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: APP_URL + '/auth.html',
      queryParams: { access_type: 'online', prompt: 'select_account' }
    }
  })
  // Only reached on error — success causes full page redirect to Google
  setLoading(btnId, false)
  if (error) showMsg(msgId, 'error', 'שגיאה בכניסה עם Google — נסה שוב')
}

// ── RESEND VERIFY ────────────────────────────────────────────
async function doResend() {
  if (resendTimer) return
  if (!pendingEmail) {
    showMsg('verify-msg', 'error', 'טען את הדף מחדש ונסה שוב')
    return
  }

  setLoading('resend-btn', true)
  var { error } = await sb.auth.resend({
    type: 'signup',
    email: pendingEmail,
    options: { emailRedirectTo: APP_URL + '/auth.html' }
  })
  setLoading('resend-btn', false)

  if (error) {
    var m = error.message || ''
    if (m.toLowerCase().includes('already confirmed') || m.toLowerCase().includes('email_exists')) {
      showMsg('verify-msg', 'info', 'המייל כבר מאושר — חזור להתחברות')
    } else {
      showMsg('verify-msg', 'error', 'שגיאה בשליחה — נסה שוב בעוד כמה דקות')
    }
    return
  }
  showMsg('verify-msg', 'success', 'קישור נשלח! בדוק גם ספאם')
  startCooldown()
}

function startCooldown() {
  var secs   = 60
  var timerEl = document.getElementById('resend-timer')
  var btn     = document.getElementById('resend-btn')
  btn.disabled = true
  resendTimer = setInterval(function() {
    secs--
    timerEl.textContent = 'ניתן לשלוח שוב בעוד ' + secs + ' שניות'
    if (secs <= 0) {
      clearInterval(resendTimer); resendTimer = null
      timerEl.textContent = ''
      btn.disabled = false
    }
  }, 1000)
}

// ── FORGOT PASSWORD ──────────────────────────────────────────
async function doForgot() {
  if (document.getElementById('forgot-btn').disabled) return  // already in-flight
  var email = document.getElementById('forgot-email').value.trim()
  if (!validEmail(email)) return showMsg('forgot-msg', 'error', 'כתובת אימייל לא תקינה')

  setLoading('forgot-btn', true)
  // Always call — never reveal whether email exists (prevents enumeration)
  await sb.auth.resetPasswordForEmail(email, {
    redirectTo: APP_URL + '/auth.html'
  })
  setLoading('forgot-btn', false)

  showMsg('forgot-msg', 'success', 'אם קיים חשבון לכתובת זו, נשלח קישור איפוס')
}

// ── RESET PASSWORD ───────────────────────────────────────────
async function doReset() {
  if (document.getElementById('reset-btn').disabled) return  // already in-flight
  var pass  = document.getElementById('reset-pass').value
  var pass2 = document.getElementById('reset-pass2').value

  if (pass.length < 8) return showMsg('reset-msg', 'error', 'הסיסמה חייבת להכיל לפחות 8 תווים')
  if (pass !== pass2)  return showMsg('reset-msg', 'error', 'הסיסמאות אינן תואמות')

  setLoading('reset-btn', true)
  var { error } = await sb.auth.updateUser({ password: pass })
  setLoading('reset-btn', false)

  if (error) { showMsg('reset-msg', 'error', 'שגיאה — הקישור פג, בקש קישור חדש'); return; }

  await sb.auth.signOut()
  window.location.replace('auth.html?msg=password_reset')
}

// ── KEYBOARD: Enter submits active form ──────────────────────
// Each action function checks btn.disabled internally — no extra guard needed here.
// This means rapid Enter presses while a request is in-flight are silently dropped.
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return
  // Don't trigger if focus is inside a textarea or a button (let native click handle it)
  var tag = document.activeElement && document.activeElement.tagName
  if (tag === 'TEXTAREA' || tag === 'BUTTON') return
  var active = document.querySelector('.view.active')
  if (!active) return
  switch (active.id) {
    case 'v-login':  doLogin();  break
    case 'v-signup': doSignup(); break
    case 'v-forgot': doForgot(); break
    case 'v-reset':  doReset();  break
  }
})
</script>
